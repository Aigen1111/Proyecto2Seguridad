services:

  # ===================== BASE DE DATOS =====================
  postgres:
    image: postgres:15-alpine
    container_name: proyecto_seguridad_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ProyectoSeguridad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proyecto_network

  # ==================== API .NET ====================
  api:
    build:
      context: ./ProyectoSeguridad
      dockerfile: Dockerfile
    container_name: proyecto_seguridad_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=ProyectoSeguridad;Username=postgres;Password=${DB_PASSWORD:-postgres}"
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: ProyectoSeguridad
      Jwt__Audience: ProyectoSeguridad
    ports:
    - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proyecto_network
    restart: unless-stopped

  # ==================== PGADMIN (opcional, para ver la BD) ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: proyecto_seguridad_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ejemplo.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - proyecto_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  proyecto_network:
    driver: bridge
