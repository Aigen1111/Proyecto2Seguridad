version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: proyecto_seguridad_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ProyectoSeguridad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proyecto_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: proyecto_seguridad_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@seguridad.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - proyecto_network

  api:
    build:
      context: ./ProyectoSeguridad
      dockerfile: Dockerfile
    container_name: proyecto_seguridad_api
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=ProyectoSeguridad;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "https://+:443;http://+:80"
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/https/aspnetapp.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: "certpassword"
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ProyectoSeguridad:/app
    networks:
      - proyecto_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  proyecto_network:
    driver: bridge
